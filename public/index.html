<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WhatsFlow AI — Panel</title>
  <style>
    :root { --green:#25603f; --green2:#2e7d52; --bg:#f0f2f5; --panel:#fff; --line:#e2e6ea; --muted:#6b7580; --ai:#e7f3ff; --human:#dcf8c6; --contact:#fff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:#1c1e21; }
    button { cursor:pointer; font:inherit; }
    input, textarea, select { font:inherit; }
    .hidden { display:none !important; }

    /* Auth */
    #auth { min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:var(--panel); border-radius:12px; box-shadow:0 4px 24px rgba(0,0,0,.08); padding:32px; width:360px; }
    .card h1 { margin:0 0 4px; font-size:22px; color:var(--green); }
    .card p.sub { margin:0 0 20px; color:var(--muted); font-size:14px; }
    .field { margin-bottom:12px; }
    .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:4px; }
    .field input { width:100%; padding:10px; border:1px solid var(--line); border-radius:8px; }
    .btn { width:100%; padding:11px; border:none; border-radius:8px; background:var(--green); color:#fff; font-weight:600; }
    .btn:hover { background:var(--green2); }
    .btn.sec { background:#eceff1; color:#333; }
    .toggle { text-align:center; margin-top:14px; font-size:14px; color:var(--muted); }
    .toggle a { color:var(--green); cursor:pointer; }
    .err { background:#fdecea; color:#b3261e; padding:9px 12px; border-radius:8px; font-size:13px; margin-bottom:12px; }

    /* App */
    #app { height:100vh; display:flex; flex-direction:column; }
    header { background:var(--green); color:#fff; display:flex; align-items:center; padding:0 16px; height:52px; gap:16px; }
    header .brand { font-weight:700; }
    header nav { display:flex; gap:4px; margin-left:8px; }
    header nav button { background:transparent; border:none; color:#dfeee6; padding:8px 12px; border-radius:7px; }
    header nav button.active { background:rgba(255,255,255,.18); color:#fff; }
    header .spacer { flex:1; }
    header .who { font-size:13px; opacity:.9; }
    header .logout { background:rgba(255,255,255,.15); border:none; color:#fff; padding:7px 12px; border-radius:7px; }
    main { flex:1; overflow:hidden; }

    /* Inbox */
    .inbox { display:flex; height:100%; }
    .list { width:340px; border-right:1px solid var(--line); background:var(--panel); overflow-y:auto; }
    .list .filters { display:flex; gap:6px; padding:10px; border-bottom:1px solid var(--line); }
    .list .filters select { flex:1; padding:6px; border:1px solid var(--line); border-radius:7px; }
    .conv { padding:12px 14px; border-bottom:1px solid var(--line); cursor:pointer; }
    .conv:hover { background:#f7f9fa; }
    .conv.sel { background:#eaf3ee; }
    .conv .top { display:flex; justify-content:space-between; align-items:center; }
    .conv .name { font-weight:600; }
    .conv .phone { color:var(--muted); font-size:12px; }
    .badge { font-size:11px; padding:2px 7px; border-radius:10px; font-weight:600; }
    .badge.AI { background:var(--ai); color:#1d6fb8; }
    .badge.HUMAN { background:#ffe8cc; color:#b26a00; }
    .badge.CLOSED { background:#eceff1; color:#607d8b; }

    .thread { flex:1; display:flex; flex-direction:column; background:#efe7de; }
    .thread .empty { margin:auto; color:var(--muted); }
    .thread .thead { background:var(--panel); border-bottom:1px solid var(--line); padding:10px 16px; display:flex; align-items:center; gap:10px; }
    .thread .thead .name { font-weight:600; }
    .thread .thead .spacer { flex:1; }
    .thread .thead button { border:1px solid var(--line); background:#fff; padding:6px 10px; border-radius:7px; font-size:13px; }
    .msgs { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }
    .bubble { max-width:70%; padding:8px 12px; border-radius:10px; font-size:14px; box-shadow:0 1px 1px rgba(0,0,0,.06); white-space:pre-wrap; word-wrap:break-word; }
    .bubble .meta { display:block; font-size:10px; color:var(--muted); margin-top:4px; }
    .in { align-self:flex-start; background:var(--contact); }
    .out { align-self:flex-end; }
    .out.AI { background:var(--ai); }
    .out.HUMAN { background:var(--human); }
    .composer { display:flex; gap:8px; padding:12px; background:var(--panel); border-top:1px solid var(--line); }
    .composer input { flex:1; padding:11px; border:1px solid var(--line); border-radius:20px; }
    .composer button { padding:0 20px; border:none; border-radius:20px; background:var(--green); color:#fff; font-weight:600; }

    /* Contacts */
    .contacts { height:100%; overflow-y:auto; padding:20px; }
    .contacts .wrap { max-width:760px; margin:0 auto; }
    .contacts h2 { margin:0 0 14px; }
    .newc { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
    .newc input { padding:9px; border:1px solid var(--line); border-radius:8px; }
    .newc button { padding:9px 16px; border:none; border-radius:8px; background:var(--green); color:#fff; font-weight:600; }
    table { width:100%; border-collapse:collapse; background:var(--panel); border-radius:10px; overflow:hidden; }
    th, td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); font-size:14px; }
    th { background:#f7f9fa; color:var(--muted); font-weight:600; }
  </style>
</head>
<body>
  <!-- ===== Pantalla de acceso ===== -->
  <div id="auth">
    <div class="card">
      <h1>WhatsFlow AI</h1>
      <p class="sub" id="authSub">Inicia sesión en tu panel</p>
      <div id="authErr" class="err hidden"></div>

      <div id="regName" class="field hidden">
        <label>Nombre de la empresa</label>
        <input id="f_tenant" placeholder="Mi Negocio SA" />
      </div>
      <div id="regNameU" class="field hidden">
        <label>Tu nombre</label>
        <input id="f_name" placeholder="Aaron" />
      </div>
      <div class="field">
        <label>Email</label>
        <input id="f_email" type="email" placeholder="tu@empresa.com" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input id="f_pass" type="password" placeholder="••••••••" />
      </div>
      <button class="btn" id="authBtn">Entrar</button>
      <div class="toggle" id="authToggle">
        ¿No tienes cuenta? <a id="toggleLink">Crea tu empresa</a>
      </div>
    </div>
  </div>

  <!-- ===== App ===== -->
  <div id="app" class="hidden">
    <header>
      <span class="brand">WhatsFlow AI</span>
      <nav>
        <button data-tab="inbox" class="active">Bandeja</button>
        <button data-tab="contacts">Contactos</button>
      </nav>
      <span class="spacer"></span>
      <span class="who" id="who"></span>
      <button class="logout" id="logout">Salir</button>
    </header>
    <main>
      <!-- Bandeja -->
      <section id="tab-inbox" class="inbox">
        <div class="list">
          <div class="filters">
            <select id="fStatus">
              <option value="">Todas</option>
              <option value="OPEN">Abiertas</option>
              <option value="CLOSED">Cerradas</option>
            </select>
            <select id="fHandled">
              <option value="">IA + Humano</option>
              <option value="AI">Solo IA</option>
              <option value="HUMAN">Solo humano</option>
            </select>
          </div>
          <div id="convList"></div>
        </div>
        <div class="thread" id="thread">
          <div class="empty">Selecciona una conversación</div>
        </div>
      </section>

      <!-- Contactos -->
      <section id="tab-contacts" class="contacts hidden">
        <div class="wrap">
          <h2>Contactos</h2>
          <div class="newc">
            <input id="c_phone" placeholder="Teléfono (5215500000000)" />
            <input id="c_name" placeholder="Nombre (opcional)" />
            <button id="c_add">Añadir</button>
          </div>
          <div id="cErr" class="err hidden"></div>
          <table>
            <thead><tr><th>Nombre</th><th>Teléfono</th><th>Notas</th></tr></thead>
            <tbody id="cBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
  (function () {
    const $ = (id) => document.getElementById(id);
    let token = localStorage.getItem('wf_token') || '';
    let me = JSON.parse(localStorage.getItem('wf_me') || 'null');
    let mode = 'login';        // 'login' | 'register'
    let currentConv = null;

    // ---- API helper ----
    async function api(path, opts = {}) {
      const headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(path, Object.assign({}, opts, { headers }));
      if (res.status === 401) { logout(); throw new Error('Sesión expirada'); }
      const data = res.status === 204 ? null : await res.json().catch(() => null);
      if (!res.ok) throw new Error((data && data.message) || ('Error ' + res.status));
      return data;
    }
    const esc = (s) => (s == null ? '' : String(s).replace(/[&<>]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c])));
    const fmt = (d) => new Date(d).toLocaleString('es', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });

    // ---- Auth UI ----
    function setMode(m) {
      mode = m;
      const reg = m === 'register';
      $('regName').classList.toggle('hidden', !reg);
      $('regNameU').classList.toggle('hidden', !reg);
      $('authSub').textContent = reg ? 'Crea tu empresa y tu usuario' : 'Inicia sesión en tu panel';
      $('authBtn').textContent = reg ? 'Crear empresa' : 'Entrar';
      $('authToggle').innerHTML = reg
        ? '¿Ya tienes cuenta? <a id="toggleLink">Inicia sesión</a>'
        : '¿No tienes cuenta? <a id="toggleLink">Crea tu empresa</a>';
      $('toggleLink').onclick = () => setMode(reg ? 'login' : 'register');
      showErr('');
    }
    function showErr(msg) { const e = $('authErr'); e.textContent = msg; e.classList.toggle('hidden', !msg); }

    $('authBtn').onclick = async () => {
      showErr('');
      const email = $('f_email').value.trim(), password = $('f_pass').value;
      try {
        let res;
        if (mode === 'register') {
          res = await api('/auth/register', { method:'POST', body: JSON.stringify({
            tenantName: $('f_tenant').value.trim(), name: $('f_name').value.trim(), email, password }) });
        } else {
          res = await api('/auth/login', { method:'POST', body: JSON.stringify({ email, password }) });
        }
        token = res.accessToken; me = res.user;
        localStorage.setItem('wf_token', token);
        localStorage.setItem('wf_me', JSON.stringify(me));
        enterApp();
      } catch (e) { showErr(e.message); }
    };
    $('toggleLink').onclick = () => setMode('register');

    // ---- App shell ----
    function enterApp() {
      $('auth').classList.add('hidden');
      $('app').classList.remove('hidden');
      $('who').textContent = me ? (me.name + ' · ' + me.email) : '';
      loadConversations();
    }
    function logout() {
      token = ''; me = null; currentConv = null;
      localStorage.removeItem('wf_token'); localStorage.removeItem('wf_me');
      $('app').classList.add('hidden');
      $('auth').classList.remove('hidden');
    }
    $('logout').onclick = logout;

    document.querySelectorAll('header nav button').forEach((b) => {
      b.onclick = () => {
        document.querySelectorAll('header nav button').forEach((x) => x.classList.remove('active'));
        b.classList.add('active');
        const tab = b.dataset.tab;
        $('tab-inbox').classList.toggle('hidden', tab !== 'inbox');
        $('tab-contacts').classList.toggle('hidden', tab !== 'contacts');
        if (tab === 'contacts') loadContacts();
        if (tab === 'inbox') loadConversations();
      };
    });

    // ---- Inbox ----
    $('fStatus').onchange = loadConversations;
    $('fHandled').onchange = loadConversations;

    async function loadConversations() {
      const qs = new URLSearchParams();
      if ($('fStatus').value) qs.set('status', $('fStatus').value);
      if ($('fHandled').value) qs.set('handledBy', $('fHandled').value);
      try {
        const list = await api('/conversations' + (qs.toString() ? '?' + qs : ''));
        renderConvList(list);
      } catch (e) { /* sesión */ }
    }
    function renderConvList(list) {
      const el = $('convList');
      if (!list.length) { el.innerHTML = '<div style="padding:20px;color:#6b7580">Sin conversaciones todavía.</div>'; return; }
      el.innerHTML = list.map((c) => {
        const badge = c.status === 'CLOSED' ? '<span class="badge CLOSED">Cerrada</span>'
          : '<span class="badge ' + c.handledBy + '">' + (c.handledBy === 'AI' ? 'IA' : 'Humano') + '</span>';
        const nm = esc(c.contact.name || c.contact.phone);
        return '<div class="conv' + (currentConv === c.id ? ' sel' : '') + '" data-id="' + c.id + '">'
          + '<div class="top"><span class="name">' + nm + '</span>' + badge + '</div>'
          + '<div class="phone">' + esc(c.contact.phone) + (c.lastMessageAt ? ' · ' + fmt(c.lastMessageAt) : '') + '</div></div>';
      }).join('');
      el.querySelectorAll('.conv').forEach((d) => d.onclick = () => openConversation(d.dataset.id));
    }

    async function openConversation(id) {
      currentConv = id;
      document.querySelectorAll('.conv').forEach((d) => d.classList.toggle('sel', d.dataset.id === id));
      const c = await api('/conversations/' + id);
      renderThread(c);
    }
    function renderThread(c) {
      const isHuman = c.handledBy === 'HUMAN';
      const handoffBtn = isHuman
        ? '<button id="btnHandback">Devolver a IA</button>'
        : '<button id="btnHandoff">Tomar (humano)</button>';
      const closeBtn = c.status === 'CLOSED'
        ? '<button id="btnReopen">Reabrir</button>'
        : '<button id="btnClose">Cerrar</button>';
      const bubbles = (c.messages || []).map((m) => {
        const cls = m.direction === 'INBOUND' ? 'in' : ('out ' + m.sender);
        const who = m.sender === 'AI' ? 'IA' : m.sender === 'HUMAN' ? 'Agente' : (c.contact.name || 'Cliente');
        return '<div class="bubble ' + cls + '">' + esc(m.content)
          + '<span class="meta">' + esc(who) + ' · ' + fmt(m.createdAt) + '</span></div>';
      }).join('');
      $('thread').innerHTML =
        '<div class="thead"><span class="name">' + esc(c.contact.name || c.contact.phone) + '</span>'
        + '<span class="badge ' + (c.status === 'CLOSED' ? 'CLOSED' : c.handledBy) + '">'
        + (c.status === 'CLOSED' ? 'Cerrada' : c.handledBy === 'AI' ? 'IA' : 'Humano') + '</span>'
        + '<span class="spacer"></span>' + handoffBtn + closeBtn + '</div>'
        + '<div class="msgs" id="msgs">' + bubbles + '</div>'
        + '<div class="composer"><input id="msgInput" placeholder="Escribe un mensaje..." />'
        + '<button id="sendBtn">Enviar</button></div>';
      const msgs = $('msgs'); msgs.scrollTop = msgs.scrollHeight;

      const send = async () => {
        const input = $('msgInput'); const text = input.value.trim();
        if (!text) return;
        input.value = '';
        try { await api('/conversations/' + c.id + '/messages', { method:'POST', body: JSON.stringify({ text }) }); }
        catch (e) { alert(e.message); }
        await openConversation(c.id); await loadConversations();
      };
      $('sendBtn').onclick = send;
      $('msgInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

      const act = async (path) => { await api('/conversations/' + c.id + path, { method:'POST' }); await openConversation(c.id); await loadConversations(); };
      if ($('btnHandoff')) $('btnHandoff').onclick = () => act('/handoff');
      if ($('btnHandback')) $('btnHandback').onclick = () => act('/handback');
      if ($('btnClose')) $('btnClose').onclick = () => act('/close');
      if ($('btnReopen')) $('btnReopen').onclick = () => act('/reopen');
    }

    // ---- Contactos ----
    async function loadContacts() {
      try {
        const list = await api('/contacts');
        $('cBody').innerHTML = list.length
          ? list.map((c) => '<tr><td>' + esc(c.name || '—') + '</td><td>' + esc(c.phone) + '</td><td>' + esc(c.notes || '') + '</td></tr>').join('')
          : '<tr><td colspan="3" style="color:#6b7580">Sin contactos.</td></tr>';
      } catch (e) {}
    }
    $('c_add').onclick = async () => {
      const phone = $('c_phone').value.trim(), name = $('c_name').value.trim();
      const err = $('cErr'); err.classList.add('hidden');
      try {
        await api('/contacts', { method:'POST', body: JSON.stringify({ phone, name: name || undefined }) });
        $('c_phone').value = ''; $('c_name').value = '';
        loadContacts();
      } catch (e) { err.textContent = e.message; err.classList.remove('hidden'); }
    };

    // ---- Init ----
    setMode('login');
    if (token && me) enterApp();
  })();
  </script>
</body>
</html>
